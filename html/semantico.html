<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Projeto HTML semântico</title>
        <link rel="stylesheet" href="../assets/css/style.css">
        <style>
            header { 
                background-color:blue;
                padding: 5px;
                border: 10px solid skyblue;
                margin: 10px;
                background-clip: content-box;
            }
            nav {
                background-color:darkorange;
                border: 10px solid lightblue;
                margin: 10px;
                padding: 5px;
                background-clip: content-box;
            }
            main {
                background-color:grey;
                padding: 5px;
                margin: 10px;
                border: 10px solid lightgray;
                background-clip: content-box;
            }
            article {
                background-color:green;
                padding: 5px;
                margin: 10px;
                border: 2px dashed;
                background-clip: content-box;
            }
            section {
                background-color:goldenrod;
                padding: 5px;
                margin: 10px;
                border: 10px solid lightgrey;
                background-clip: content-box;
            }
            aside {
                background-color:purple;
                padding: 5px;
                margin: 10px;
                border: 10px solid lightgrey;
                background-clip: content-box;
            }
            footer {
                background-color:black;
                padding: 5px;
                margin: 10px;
                border: 10px solid lightgrey;
                background-clip: content-box;
            }
        </style>
    <body>
        <header style="color:white">
            <h1>Título do site(header)</h1>
            <nav>
                <ul>
                    <li><p><a href="#">Início</a></p></li>
                    <li><p><a href="#">Sobre</a></p></li>
                </ul>
            </nav>
        </header>
        <main>
            <section>
                <h1>Nova missão(section)</h1>
                <article>
                    <h3>História da empresa(article)</h3>
                    <p>Conteúdo independente...</p>
                </article>
            </section>
            <aside style="color:white">
                <p>Links relacionados(aside)</p>
            </aside>
        </main>
        <footer style="color:white">
            <h4>@2026 - Rodapé Semántico</h4>
        </footer>
    </body>
</html>
